apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: claims-api-alerts
  labels:
    app.kubernetes.io/name: claims-api
    release: prometheus
spec:
  groups:
    - name: claims-api.availability
      rules:
        - alert: claims-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="claims-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="claims-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Payments
          annotations:
            summary: claims-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: claims-apiUnavailable
          expr: up{job="claims-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Payments
          annotations:
            summary: claims-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
