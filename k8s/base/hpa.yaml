apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: claims-api
  labels:
    app.kubernetes.io/name: claims-api
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: claims-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
